apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform

helmCharts:
  - name: cert-manager
    repo: https://charts.jetstack.io
    version: "v1.17.2"
    releaseName: cert-manager
    namespace: platform
    valuesInline:
      crds:
        enabled: true
      replicaCount: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      webhook:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
      cainjector:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
