apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: "72.9.0"
    releaseName: prometheus
    namespace: platform
    valuesInline:
      # Dev-sized resources — single node Minikube
      prometheus:
        prometheusSpec:
          retention: 7d
          retentionSize: "4GB"
          storageSpec:
            volumeClaimTemplate:
              spec:
                storageClassName: standard
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          # Scrape the OTel Collector Prometheus exporter
          additionalScrapeConfigs:
            - job_name: otel-collector
              static_configs:
                - targets:
                    - otel-collector.platform.svc.cluster.local:8889
      alertmanager:
        enabled: false   # not needed for dev
      grafana:
        enabled: false   # deployed separately
      nodeExporter:
        enabled: true
      kubeStateMetrics:
        enabled: true
      prometheusOperator:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
