---
# Integration event topics — align with Kafka consumers in the .NET services
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: ecom-payments
  namespace: data
  labels:
    strimzi.io/cluster: ecom-kafka-dev
spec:
  partitions: 3
  replicas: 1
  config:
    retention.ms: "604800000"   # 7 days
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: ecom-shipments
  namespace: data
  labels:
    strimzi.io/cluster: ecom-kafka-dev
spec:
