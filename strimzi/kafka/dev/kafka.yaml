---
# Kafka cluster in KRaft mode (no ZooKeeper)
# Mirrors the confluentinc/cp-kafka:7.8.0 configuration from docker-compose.infra.yml
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: ecom-kafka-dev
  namespace: data
  labels:
    app.kubernetes.io/name: ecom-kafka
    app.kubernetes.io/component: messaging
    environment: dev
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 3.9.0
    metadataVersion: 3.9-IV0
    replicas: 1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      inter.broker.protocol.version: "3.9"
      log.retention.hours: 168
      auto.create.topics.enable: "false"   # Topics declared explicitly via KafkaTopic CRs
      log.cleanup.policy: delete
      replica.fetch.max.bytes: "104857600"
    storage:
      type: persistent-claim
      size: 5Gi
      class: standard   # Minikube default StorageClass
      deleteClaim: false
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    template:
      pod:
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
  # KRaft controller (combined with broker for single-node dev)
  entityOperator:
    topicOperator:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
    userOperator:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

# Bootstrap address used by application services:
#   ecom-kafka-dev-kafka-bootstrap.data.svc.cluster.local:9092
