apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform

helmCharts:
  - name: sealed-secrets
    repo: https://bitnami-labs.github.io/sealed-secrets
    version: "2.17.3"
    releaseName: sealed-secrets
    namespace: platform
    valuesInline:
      fullnameOverride: sealed-secrets-controller
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      # Persist the master key as a Secret so recovery is possible
      secretName: sealed-secrets-key
      keyrenewperiod: "720h"   # 30 days
