---
# Postgres superuser credentials — ENCRYPT with kubeseal before committing
# kubectl create secret generic ecom-postgres-superuser \
#   --from-literal=username=postgres \
#   --from-literal=password=CHANGE_ME \
#   --dry-run=client -o yaml | \
#   kubeseal --controller-namespace platform --format yaml > superuser-secret.yaml
#
# The SealedSecret below is a PLACEHOLDER. Replace with the kubeseal output.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ecom-postgres-superuser
  namespace: data
spec:
  encryptedData:
    username: REPLACE_WITH_KUBESEAL_OUTPUT
    password: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: ecom-postgres-superuser
      namespace: data
---
# CloudNativePG Cluster: 1 instance for dev (scale to 3 for prod when needed)
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ecom-postgres-dev
  namespace: data
  labels:
    app.kubernetes.io/name: ecom-postgres
    app.kubernetes.io/component: database
    environment: dev
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18

  # PostgreSQL configuration — mirrors docker-compose.infra.yml settings
  postgresql:
    parameters:
      wal_level: "logical"
      max_wal_senders: "10"
      max_replication_slots: "10"
      shared_preload_libraries: "pg_stat_statements"
      pg_stat_statements.track: "all"

  superuserSecret:
    name: ecom-postgres-superuser

  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      secret:
        name: ecom-postgres-superuser
      # Databases are created by the db-init Job after cluster is Ready

  storage:
    size: 5Gi
    storageClass: standard   # Minikube default; override for other environments

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  monitoring:
    enablePodMonitor: false   # set true when Prometheus operator is present

  backup:
    retentionPolicy: "7d"

  # Primary service names used by application services:
  #   Read-write: ecom-postgres-dev-rw.data.svc.cluster.local:5432
  #   Read-only:  ecom-postgres-dev-ro.data.svc.cluster.local:5432
