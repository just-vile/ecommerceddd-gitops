# Wave 2: Strimzi operator
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-strimzi-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: project-platform
  source:
    repoURL: https://github.com/just-vile/ecommerceddd-gitops
    path: platform/strimzi/operator
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
