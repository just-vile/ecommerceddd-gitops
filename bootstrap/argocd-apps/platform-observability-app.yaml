# Wave 4: Full observability stack (OTel Collector, Prometheus, Grafana)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-observability-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: project-platform
  source:
    repoURL: https://github.com/just-vile/ecommerceddd-gitops
    path: platform/observability/otel-collector/overlays/dev
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
---
