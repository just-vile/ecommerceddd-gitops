---
# Ingress for Kafka UI access
# For Minikube: add entry to /etc/hosts or use `minikube ip`
# Example: 192.168.99.100 kafka-ui.local (then http://kafka-ui.local)
# Or access via: http://<minikube-ip>
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kafka-ui
  namespace: platform
spec:
  ingressClassName: nginx
  rules:
    - host: kafka-ui.dev.ecommerceddd.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafka-ui
                port:
                  number: 8080
