---
# ClusterIP Service for Kafka UI
# Access via: kubectl port-forward -n platform svc/kafka-ui 8080:8080
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: platform
  labels:
    app.kubernetes.io/name: kafka-ui
    app.kubernetes.io/component: messaging-ui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kafka-ui
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
