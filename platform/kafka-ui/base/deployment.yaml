---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: platform
  labels:
    app.kubernetes.io/name: kafka-ui
    app.kubernetes.io/component: messaging-ui
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-ui
        app.kubernetes.io/component: messaging-ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:v0.7.2
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: ecom-kafka-dev
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: kafka.platform.svc.cluster.local:9092
            - name: KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME
              value: connect
            - name: KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS
              value: http://connect.platform.svc.cluster.local:8083
            - name: DYNAMIC_CONFIG_ENABLED
              value: "false"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
