---
# KafkaNodePool — required when strimzi.io/node-pools: enabled (KRaft mode)
# Combines broker + controller roles in a single node for single-node dev.
# https://strimzi.io/docs/operators/latest/deploying#type-KafkaNodePool-reference
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: ecom-kafka-dev
  namespace: data
  labels:
    app.kubernetes.io/name: ecom-kafka
    app.kubernetes.io/component: messaging
    environment: dev
    strimzi.io/cluster: ecom-kafka-dev   # must match the Kafka CR metadata.name
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  # Combined broker + controller for a single dev node (no separate controller pool needed)
  roles:
    - broker
    - controller
  replicas: 1
  storage:
    type: persistent-claim
    size: 5Gi
    class: standard     # Minikube default StorageClass
    deleteClaim: false
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  template:
    pod:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    kafkaContainer:
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false   # Kafka writes to log dirs
        capabilities:
          drop:
            - ALL
