apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
 
namespace: platform
 
# Strimzi operator — manages Kafka in KRaft mode via KafkaNodePool CRs
# Pin to a specific release to avoid unintended upgrades.
# Check latest: https://github.com/strimzi/strimzi-kafka-operator/releases
resources:
  - https://github.com/strimzi/strimzi-kafka-operator/releases/download/0.45.0/strimzi-cluster-operator-0.45.0.yaml
 
# Restrict operator to watch only the 'data' namespace.
# Patch the operator ConfigMap instead of Deployment env to avoid value/valueFrom conflicts.
patches:
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: strimzi-cluster-operator
      data:
        STRIMZI_NAMESPACE: data
    target:
      kind: ConfigMap
      name: strimzi-cluster-operator
  - patch: |-
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: strimzi-cluster-operator-leader-election
      subjects:
        - kind: ServiceAccount
          name: strimzi-cluster-operator
          namespace: platform
    target:
      kind: RoleBinding
      name: strimzi-cluster-operator-leader-election