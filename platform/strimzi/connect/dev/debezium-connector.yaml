---
# Debezium PostgreSQL connectors — one per database, matching DebeziumConnectorSetup.BuildDebeziumConfig()
# in EcommerceDDD.Core.Infrastructure/Outbox/DebeziumConnectorSetup.cs.
#
# The .NET services also register connectors dynamically via HTTP PUT at startup.
# With strimzi.io/use-connector-resources: "true" on the KafkaConnect CR, Strimzi
# owns connector lifecycle; the .NET PUT is idempotent and benign (it will be reconciled
# back to the CR definition on the next Strimzi reconcile cycle).
#
# Secret prerequisite (create before syncing this resource):
#   kubectl create secret generic kafka-connector-credentials \
#     --from-literal=username=postgres \
#     --from-literal=password=<POSTGRES_PASSWORD> \
#     -n data

# ── OrderProcessing: ordersdb ─────────────────────────────────────────────────
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: orders-connector
  namespace: data
  labels:
    strimzi.io/cluster: ecom-connect-dev
    app.kubernetes.io/component: cdc
    environment: dev
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  class: io.debezium.connector.postgresql.PostgresConnector
  tasksMax: 1
  config:
    # ── Database connection ────────────────────────────────────────────────────
    database.hostname: postgres.data.svc.cluster.local
    database.port: "5432"
    database.dbname: ordersdb
    database.user: "${file:/opt/kafka/external-configuration/connector-secret/username}"
    database.password: "${file:/opt/kafka/external-configuration/connector-secret/password}"
    database.server.name: postgres     # matches DatabaseServerName in appsettings.json
    # ── Replication slot ────────────────────────────────────────────────────────
    topic.prefix: orders               # matches TopicPrefix in appsettings.json
    slot.name: orders                  # matches SlotName in appsettings.json
    schema.include.list: public        # matches SchemaIncludeList
    table.include.list: public.mt_doc_outboxmessages   # matches TableIncludeList
    plugin.name: pgoutput
    snapshot.mode: never
    tombstones.on.delete: "false"
    # ── Outbox EventRouter transform ────────────────────────────────────────────
    transforms: outbox
    transforms.outbox.type: io.debezium.transforms.outbox.EventRouter
    transforms.outbox.table.field.event.id: id
    transforms.outbox.table.field.event.key: mt_dotnet_type
    transforms.outbox.table.field.event.payload: data
    transforms.outbox.route.by.id: id
    transforms.outbox.route.by.field: mt_dotnet_type
    transforms.outbox.route.topic.replacement: orders  # matches TransformsTopicReplacement (lowercased)
    transforms.outbox.table.fields.additional.placement: "mt_dotnet_type:header:eventType"
    transforms.outbox.debezium.expand.json.payload: "true"
    # ── Converters (match appsettings.json) ────────────────────────────────────
    key.converter: org.apache.kafka.connect.storage.StringConverter
    value.converter: org.apache.kafka.connect.storage.StringConverter
    internal.key.converter: org.apache.kafka.connect.json.JsonConverter
    internal.value.converter: org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable: "false"
    value.converter.schemas.enable: "false"
    # ── Error handling ──────────────────────────────────────────────────────────
    errors.tolerance: none
    errors.deadletterqueue.topic.name: ecom.dlq
    errors.deadletterqueue.topic.replication.factor: "1"
---
