---
# Integration event topics consumed by .NET services (KafkaConsumer__Topics: ["payments","shipments","orders"])
# spec.topicName sets the actual Kafka topic name; metadata.name is the K8s resource name.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: ecom-payments-dev
  namespace: data
  labels:
    strimzi.io/cluster: ecom-kafka-dev
spec:
  topicName: payments   # matches KafkaConsumer.Topics in OrderProcessing appsettings.json
  partitions: 3
  replicas: 1
  config:
    retention.ms: "604800000"   # 7 days
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: ecom-shipments-dev
  namespace: data
  labels:
    strimzi.io/cluster: ecom-kafka-dev
spec:
  topicName: shipments   # matches KafkaConsumer.Topics in OrderProcessing appsettings.json
  partitions: 3
  replicas: 1
  config:
    retention.ms: "604800000"
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: ecom-orders-dev
  namespace: data
  labels:
    strimzi.io/cluster: ecom-kafka-dev
spec:
  topicName: orders   # matches KafkaConsumer.Topics in OrderProcessing appsettings.json
  partitions: 3
  replicas: 1
  config:
    retention.ms: "604800000"
    cleanup.policy: delete
---
# Kafka Connect internal topics — must be pre-declared because auto.create.topics.enable: false.
# These are referenced in the KafkaConnect config (offset.storage.topic, config.storage.topic, status.storage.topic).
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: connect-configs
  namespace: data
  labels:
    strimzi.io/cluster: ecom-kafka-dev
spec:
  topicName: CONNECT_CONFIGS
  partitions: 1
  replicas: 1
  config:
    cleanup.policy: compact
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: connect-offsets
  namespace: data
  labels:
    strimzi.io/cluster: ecom-kafka-dev
spec:
  topicName: CONNECT_OFFSETS
  partitions: 25
  replicas: 1
  config:
    cleanup.policy: compact
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: connect-statuses
  namespace: data
  labels:
    strimzi.io/cluster: ecom-kafka-dev
spec:
  topicName: CONNECT_STATUSES
  partitions: 5
  replicas: 1
  config:
    cleanup.policy: compact
---
# Dead letter queue for connector errors
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: ecom-dlq
  namespace: data
  labels:
    strimzi.io/cluster: ecom-kafka-dev
spec:
  topicName: ecom.dlq
  partitions: 1
  replicas: 1
  config:
    retention.ms: "2592000000"   # 30 days
    cleanup.policy: delete
    cleanup.policy: delete
---
# Kafka Connect internal topics
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: connect-offsets
  namespace: data
  labels:
    strimzi.io/cluster: ecom-kafka-dev
spec:
  partitions: 25
  replicas: 1
  config:
    cleanup.policy: compact
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: connect-configs
  namespace: data
  labels:
    strimzi.io/cluster: ecom-kafka-dev
spec:
  partitions: 1
  replicas: 1
  config:
    cleanup.policy: compact
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: connect-statuses
  namespace: data
  labels:
    strimzi.io/cluster: ecom-kafka-dev
spec:
  partitions: 5
  replicas: 1
  config:
    cleanup.policy: compact
