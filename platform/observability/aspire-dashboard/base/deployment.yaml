---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aspire-dashboard
  namespace: platform
  labels:
    app.kubernetes.io/name: aspire-dashboard
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aspire-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aspire-dashboard
        app.kubernetes.io/component: observability
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aspire-dashboard
          image: mcr.microsoft.com/dotnet/aspire-dashboard:9.1
          ports:
            - name: dashboard
              containerPort: 18888
              protocol: TCP
            - name: otlp
              containerPort: 18889
              protocol: TCP
          env:
            - name: DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
