---
apiVersion: v1
kind: Service
metadata:
  name: aspire-dashboard
  namespace: platform
  labels:
    app.kubernetes.io/name: aspire-dashboard
    app.kubernetes.io/component: observability
spec:
  selector:
    app.kubernetes.io/name: aspire-dashboard
  ports:
    - name: dashboard
      port: 18888
      targetPort: dashboard
      protocol: TCP
    - name: otlp
      port: 18889
      targetPort: otlp
      protocol: TCP
  type: ClusterIP
