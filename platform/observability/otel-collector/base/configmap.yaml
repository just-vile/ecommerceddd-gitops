---
# ConfigMap: OTel Collector pipeline configuration
# Receives OTLP from all .NET services, exports to Prometheus + console (dev)
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: platform
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: observability
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        send_batch_size: 1000
        timeout: 10s
      memory_limiter:
        check_interval: 5s
        limit_mib: 256
        spike_limit_mib: 128
      resource:
        attributes:
          - key: deployment.environment
            value: dev
            action: upsert

    exporters:
      # Prometheus metrics scrape endpoint
      prometheus:
        endpoint: 0.0.0.0:8889
        namespace: ecommerceddd
        const_labels:
          environment: dev
      # Debug logging (dev only)
      debug:
        verbosity: basic
      # OTLP forwarding to Aspire Dashboard (traces + metrics) via gRPC
      otlp:
        endpoint: aspire-dashboard.platform.svc.cluster.local:18889
        tls:
          insecure: true
      # OTLP forwarding to Tempo (if deployed)
      # otlp/tempo:
      #   endpoint: tempo.platform.svc.cluster.local:4317
      #   tls:
      #     insecure: true

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      pprof:
        endpoint: 0.0.0.0:1777
      zpages:
        endpoint: 0.0.0.0:55679

    service:
      extensions: [health_check, pprof, zpages]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [otlp, debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [otlp, prometheus, debug]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [otlp, debug]
