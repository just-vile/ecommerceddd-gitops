apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform

helmCharts:
  - name: grafana
    repo: https://grafana.github.io/helm-charts
    version: "8.12.1"
    releaseName: grafana
    namespace: platform
    valuesInline:
      replicas: 1
      adminUser: admin
      # adminPassword: set via a pre-created Secret — do not put plaintext here
      admin:
        existingSecret: grafana-admin-secret
        userKey: username
        passwordKey: password
      persistence:
        enabled: true
        storageClassName: standard
        size: 1Gi
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              url: http://prometheus-kube-prometheus-prometheus.platform.svc.cluster.local:9090
              access: proxy
              isDefault: true
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: default
              orgId: 1
              folder: EcommerceDDD
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      dashboardsConfigMaps:
        default: grafana-dashboards
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - grafana.dev.ecommerceddd.local
        path: /
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
