apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/args/-
        value: --enable-ssl-passthrough
    target:
      kind: Deployment
      name: ingress-nginx-controller
