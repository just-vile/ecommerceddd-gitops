apiVersion: apps/v1
kind: Deployment
metadata:
  name: connect
  namespace: platform
  labels:
    app.kubernetes.io/name: connect
    app.kubernetes.io/component: cdc
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: connect
  template:
    metadata:
      labels:
        app.kubernetes.io/name: connect
        app.kubernetes.io/component: cdc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: connect
          image: debezium/connect:2.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          env:
            - name: BOOTSTRAP_SERVERS
              value: kafka.platform.svc.cluster.local:9092
            - name: GROUP_ID
              value: connect-cluster
            - name: CONFIG_STORAGE_TOPIC
              value: CONNECT_CONFIGS
            - name: OFFSET_STORAGE_TOPIC
              value: CONNECT_OFFSETS
            - name: STATUS_STORAGE_TOPIC
              value: CONNECT_STATUSES
            - name: CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: KEY_CONVERTER
              value: org.apache.kafka.connect.storage.StringConverter
            - name: VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: connect
            - name: CONNECT_PLUGIN_PATH
              value: /kafka/connect,/debezium-connector
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: connector-credentials
              mountPath: /opt/connect-secrets
              readOnly: true
      volumes:
        - name: connector-credentials
          secret:
            secretName: kafka-connector-credentials
            optional: true
