---
# pgAdmin credentials — pre-create this secret before bootstrap.
# Do not commit real credentials to Git.
# kubectl create secret generic ecom-pgadmin \
#   --namespace platform --from-literal=email=admin@example.com --from-literal=password=CHANGE_ME
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: platform
  labels:
    app.kubernetes.io/name: pgadmin
    app.kubernetes.io/component: database-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgadmin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgadmin
        app.kubernetes.io/component: database-ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 5050   # pgadmin uid in dpage/pgadmin4
        runAsGroup: 5050
        fsGroup: 5050
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pgadmin
          # Pin tag before production; 'latest' is acceptable for local dev only
          image: dpage/pgadmin4:9.16
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: ecom-pgadmin
                  key: email
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecom-pgadmin
                  key: password
            - name: PGADMIN_CONFIG_SERVER_MODE
              value: "False"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /misc/ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /misc/ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
