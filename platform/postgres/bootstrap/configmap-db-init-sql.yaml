---
# DB init script — idempotent; safe to rerun
# Creates all application databases if they do not already exist.
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-script
  namespace: data
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  db_init.sh: |
    #!/bin/sh
    set -e

    DATABASES="identityserverdb productsdb inventorydb customersdb quotesdb ordersdb paymentsdb shipmentsdb"

    echo "Starting idempotent DB initialisation against ${PG_HOST}..."

    for db in $DATABASES; do
      exists=$(psql -v ON_ERROR_STOP=1 \
        -h "$PG_HOST" -U "$POSTGRES_USER" \
        -tAc "SELECT 1 FROM pg_database WHERE datname = '$db'")
      if [ "$exists" = "1" ]; then
        echo "  [skip] $db already exists"
      else
        createdb -h "$PG_HOST" -U "$POSTGRES_USER" "$db"
        echo "  [ok]   $db created"
      fi
    done

    echo "DB initialisation complete."
