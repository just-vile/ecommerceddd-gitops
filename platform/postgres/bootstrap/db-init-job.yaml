---
# Job: creates all application databases after PostgreSQL becomes healthy.
# Idempotent — safe to rerun via ArgoCD hook on re-sync.
apiVersion: batch/v1
kind: Job
metadata:
  name: ecom-db-init
  namespace: platform
  labels:
    app.kubernetes.io/name: ecom-db-init
    app.kubernetes.io/component: database-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ecom-db-init
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 999   # postgres uid in official postgres:18 image
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: db-init
          image: postgres:18
          command:
            - /bin/sh
            - /scripts/db_init.sh
          env:
            - name: PG_HOST
              value: postgres.platform.svc.cluster.local
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ecom-postgres-superuser
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecom-postgres-superuser
                  key: password
          volumeMounts:
            - name: init-script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: init-script
          configMap:
            name: db-init-script
            defaultMode: 0555
