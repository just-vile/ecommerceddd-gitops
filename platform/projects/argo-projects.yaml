# project-platform: owns all cluster-level infra in platform namespace
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: project-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Platform infrastructure — ingress, cnpg, kafka, connect, observability
  sourceRepos:
    - "*"
  destinations:
    - server: "*"
      namespace: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  roles:
    - name: platform-admin
      description: Full access to platform project
      policies:
        - p, proj:project-platform:platform-admin, applications, *, project-platform/*, allow
      groups:
        - platform-team

---
# project-apps: owns all EcommerceDDD application workloads
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: project-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: EcommerceDDD application services — deployed to ecom-dev
  sourceRepos:
    - "*"
  destinations:
    - server: "*"
      namespace: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  roles:
    - name: app-deployer
      description: Deploy application services to ecom-dev
      policies:
        - p, proj:project-apps:app-deployer, applications, sync, project-apps/*, allow
        - p, proj:project-apps:app-deployer, applications, get, project-apps/*, allow
      groups:
        - app-platform-team
