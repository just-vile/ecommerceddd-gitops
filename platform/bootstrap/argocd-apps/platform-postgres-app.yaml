# Wave 1: PostgreSQL StatefulSet + Service (vanilla, no operator required)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-postgres-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: project-platform
  source:
    repoURL: https://github.com/just-vile/ecommerceddd-gitops
    path: platform/postgres/overlays/dev
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
