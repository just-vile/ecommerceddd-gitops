# Wave 3: Plain Kafka cluster (single-node KRaft)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-kafka-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: project-platform
  source:
    repoURL: https://github.com/just-vile/ecommerceddd-gitops
    path: platform/kafka/overlays/dev
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
