# Wave 5: Aspire Dashboard (receives traces from OTEL Collector)
# Deployed after OTEL Collector so it's ready to receive telemetry
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-aspire-dashboard-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: project-platform
  source:
    repoURL: https://github.com/just-vile/ecommerceddd-gitops
    path: platform/observability/aspire-dashboard/overlays/dev
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
