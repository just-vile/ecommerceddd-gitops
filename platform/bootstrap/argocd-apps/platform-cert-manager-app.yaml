# Wave 1: cert-manager
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: project-platform
  source:
    repoURL: https://github.com/just-vile/ecommerceddd-gitops
    path: platform/cert-manager/base
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
---
# Wave 1: Self-signed issuers for dev
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-cert-issuers-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: project-platform
  source:
    repoURL: https://github.com/just-vile/ecommerceddd-gitops
    path: platform/cert-manager/issuers/dev-selfsigned
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: ecom-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
