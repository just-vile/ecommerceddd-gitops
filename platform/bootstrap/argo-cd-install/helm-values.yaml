# Argo CD Helm values for Minikube dev cluster
# Pin chart version: https://artifacthub.io/packages/helm/argo/argo-cd
global:
  domain: argocd.dev.ecommerceddd.local

configs:
  params:
    server.insecure: true   # TLS terminated at ingress; remove in prod
  cm:
    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.health ~= nil then
          hs.status = obj.status.health.status
          if obj.status.health.message ~= nil then
            hs.message = obj.status.health.message
          end
        end
      end
      return hs
  rbac:
    policy.default: role:readonly

server:
  replicas: 1
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.dev.ecommerceddd.local
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    tls: false

applicationSet:
  replicas: 1

controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
