apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: platform
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: broker
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: platform
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: broker
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: controller
      port: 9093
      targetPort: controller
      protocol: TCP
