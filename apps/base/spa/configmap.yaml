apiVersion: v1
kind: ConfigMap
metadata:
  name: spa-config
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  config.json: |
    {
      "apiBaseUrl": "https://api.dev.ecommerceddd.local",
      "identityUrl": "https://id.dev.ecommerceddd.local",
      "signalRHubUrl": "https://hub.dev.ecommerceddd.local"
    }
  nginx-default.conf: |
    server {
      listen 80;
      server_name _;
      client_max_body_size 10M;

      # Root location for static files
      location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Cache assets
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|eot|ttf|otf)$ {
          expires 1y;
          add_header Cache-Control "public, immutable";
        }
      }

      # API proxy - routes to internal API gateway service
      location ~ ^/(.*Management|api|identity|signalr|hub) {
        proxy_pass http://ecommerceddd-apigateway-api:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_buffering off;
        proxy_cache_bypass $http_pragma $http_authorization;
      }

      # Deny access to sensitive files
      location ~ /\. {
        deny all;
      }
    }
