apiVersion: apps/v1
kind: Deployment
metadata:
  name: spa
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spa
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spa
    spec:
      containers:
        - name: spa
          image: ghcr.io/just-vile/SERVICE:main-latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: app-config
              mountPath: /usr/share/nginx/html/assets/config.json
              subPath: config.json
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: app-config
          configMap:
            name: spa-config
