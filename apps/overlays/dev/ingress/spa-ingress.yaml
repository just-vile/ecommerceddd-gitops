apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecom-spa
  namespace: ecom-dev
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  ingressClassName: nginx
  rules:
    - host: app.dev.ecommerceddd.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ecommerceddd-spa-spa
                port:
                  number: 80
