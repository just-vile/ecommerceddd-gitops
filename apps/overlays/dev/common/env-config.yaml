apiVersion: v1
kind: ConfigMap
metadata:
  name: ecom-dev-common-env
  namespace: ecom-dev
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  ASPNETCORE_URLS: http://+:80
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.platform.svc.cluster.local:4317
  KafkaConsumer__ConnectionString: ecom-kafka-kafka-bootstrap.data.svc.cluster.local:9092
  DebeziumSettings__ConnectorUrl: http://connect.platform.svc.cluster.local:8083/connectors/default-connector
  DebeziumSettings__DatabaseHostname: postgres.platform.svc.cluster.local
  TokenIssuerSettings__Authority: http://id.dev.ecommerceddd.local