apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/just-vile/ecommerceddd-inventory-management:cn.2
          env:
            - name: TokenIssuerSettings__Scope
              value: ecommerceddd-api.scope read write
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  Service__Name: inventory-management
  ConnectionStrings__DefaultConnection: Host=postgres.platform.svc.cluster.local;Port=5432;Database=inventorydb;Username=postgres;Password=postgres
