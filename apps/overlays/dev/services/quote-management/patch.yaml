apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/just-vile/ecommerceddd-quote-management:t7.1
          env:
            - name: Services__ProductCatalog
              value: http://ecommerceddd-product-catalog-api
            - name: TokenIssuerSettings__Scope
              value: ecommerceddd-api.scope read write delete
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  Service__Name: quote-management
  ConnectionStrings__DefaultConnection: Host=postgres.platform.svc.cluster.local;Port=5432;Database=quotesdb;Username=postgres;Password=postgres
