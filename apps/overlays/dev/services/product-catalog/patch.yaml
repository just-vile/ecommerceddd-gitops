apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/just-vile/ecommerceddd-product-catalog:t6.1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  Service__Name: product-catalog
  ConnectionStrings__DefaultConnection: Host=postgres.platform.svc.cluster.local;Port=5432;Database=productsdb;Username=postgres;Password=postgres
