apiVersion: apps/v1
kind: Deployment
metadata:
  name: spa
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  template:
    spec:
      containers:
        - name: spa
          image: ghcr.io/just-vile/ecommerceddd-spa:main-latest
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spa-config
data:
  config.json: |
    {
      "apiBaseUrl": "https://api.dev.ecommerceddd.local",
      "identityUrl": "https://id.dev.ecommerceddd.local",
      "signalRHubUrl": "https://hub.dev.ecommerceddd.local"
    }
